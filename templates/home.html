<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI_Talk - 选择你的心情</title>
    <link rel="stylesheet" href="/static/css/home.css">
</head>
<body>
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>

    <div class="home-container">
        <header class="home-header">
            <h1 class="title">
                <span class="title-word">选择</span>
                <span class="title-word">你的</span>
                <span class="title-word">心情</span>
            </h1>
            <p class="subtitle">今天，你想和谁聊聊？</p>
        </header>

        <div class="style-cards">
            <a href="/?style=warm" class="style-card warm-card">
                <div class="card-bg"></div>
                <div class="card-content">
                    <div class="card-icon">☀️</div>
                    <h2 class="card-title">热情阳光</h2>
                    <p class="card-desc">适合好心情、热恋期、分享开心事</p>
                    <div class="card-tags">
                        <span class="tag">温暖</span>
                        <span class="tag">积极</span>
                        <span class="tag">甜蜜</span>
                    </div>
                    <div class="card-enter">
                        <span>进入</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </div>
                </div>
                <div class="card-decoration deco-1"></div>
                <div class="card-decoration deco-2"></div>
                <div class="card-decoration deco-3"></div>
            </a>

            <a href="/?style=emo" class="style-card emo-card">
                <div class="card-bg"></div>
                <div class="card-content">
                    <div class="card-icon">🌙</div>
                    <h2 class="card-title">Emo时刻</h2>
                    <p class="card-desc">适合坏心情、失恋、科研不顺利</p>
                    <div class="card-tags">
                        <span class="tag">温柔</span>
                        <span class="tag">倾听</span>
                        <span class="tag">治愈</span>
                    </div>
                    <div class="card-enter">
                        <span>进入</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </div>
                </div>
                <div class="rain-drop" style="--delay: 0s; --left: 20%;"></div>
                <div class="rain-drop" style="--delay: 0.3s; --left: 50%;"></div>
                <div class="rain-drop" style="--delay: 0.6s; --left: 80%;"></div>
            </a>

            <a href="/?style=dark" class="style-card dark-card">
                <div class="card-bg"></div>
                <div class="card-content">
                    <div class="card-icon">⛓️</div>
                    <h2 class="card-title">暗黑深渊</h2>
                    <p class="card-desc">心情极其差时的归宿</p>
                    <div class="card-tags">
                        <span class="tag">冷酷</span>
                        <span class="tag">尖锐</span>
                        <span class="tag">释放</span>
                    </div>
                    <div class="card-enter">
                        <span>进入</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </div>
                </div>
                <div class="crack crack-1"></div>
                <div class="crack crack-2"></div>
                <div class="flicker"></div>
            </a>
        </div>

        <footer class="home-footer">
            <p>每个世界都有专属的角色和记忆</p>
        </footer>
    </div>

    <script src="/static/js/home.js"></script>
</body>
</html>
